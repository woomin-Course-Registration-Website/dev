name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

permissions:
  id-token: write  # GitHub OIDC 토큰 발급 (장기 액세스 키 불필요)
  contents: read

env:
  AWS_REGION: ap-northeast-2
  EKS_CLUSTER: student-mgmt-cluster
  NAMESPACE: student-mgmt

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      ecr_registry: ${{ steps.ecr_login.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # terraform output github_actions_role_arn
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.ecr_login.outputs.registry }}/student-mgmt/backend
            ${{ steps.ecr_login.outputs.registry }}/student-mgmt/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.ecr_login.outputs.registry }}/student-mgmt/backend:${{ steps.meta.outputs.version }}
            ${{ steps.ecr_login.outputs.registry }}/student-mgmt/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr_login.outputs.registry }}/student-mgmt/frontend:${{ steps.meta.outputs.version }}
            ${{ steps.ecr_login.outputs.registry }}/student-mgmt/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Install deployment tooling
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Validate deployment configuration
        env:
          ACM_CERT_ARN: ${{ secrets.ACM_CERT_ARN }}
          ALB_HOSTNAME: ${{ vars.ALB_HOSTNAME }}
        run: |
          test -n "$ACM_CERT_ARN" || (echo "ACM_CERT_ARN secret is required" && exit 1)
          test -n "$ALB_HOSTNAME" || (echo "ALB_HOSTNAME repository variable is required, e.g. alb.example.com" && exit 1)

      - name: Apply base K8s resources
        env:
          ACM_CERT_ARN: ${{ secrets.ACM_CERT_ARN }}
          ALB_HOSTNAME: ${{ vars.ALB_HOSTNAME }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/external-secrets/
          kubectl apply -f k8s/network-policy.yaml
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/backend/hpa.yaml
          kubectl apply -f k8s/backend/pdb.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/frontend/hpa.yaml
          envsubst < k8s/ingress.yaml | kubectl apply -f -

      - name: Deploy backend (무중단 Rolling Update)
        env:
          ECR_BACKEND_IMAGE: ${{ needs.build-and-push.outputs.ecr_registry }}/student-mgmt/backend
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          envsubst < k8s/backend/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Deploy frontend (무중단 Rolling Update)
        env:
          ECR_FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.ecr_registry }}/student-mgmt/frontend
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          envsubst < k8s/frontend/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=120s
