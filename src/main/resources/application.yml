spring:
  datasource:
    url: jdbc:mysql://localhost:3306/student_management?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-256-bits-long}
  access-token-expiration: 900000       # 15분 (ms)
  refresh-token-expiration: 604800000   # 7일 (ms)

cors:
  allowed-origins:
    - "*"

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# prod에서는 JWT_SECRET 환경변수 미설정 시 즉시 기동 실패하도록 fallback 제거
jwt:
  secret: ${JWT_SECRET}

# prod에서는 CORS_ALLOWED_ORIGIN 환경변수로 명시적 origin 지정 필수 (와일드카드 차단)
cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGIN}
