spring:
  datasource:
    url: jdbc:mysql://localhost:3306/student_management?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  forward-headers-strategy: framework

# Actuator: 운영 환경에서 K8s probe / 모니터링 시스템이 사용한다.
# health 그룹 분리: liveness(앱 프로세스 살아있는지) / readiness(트래픽 수용 가능한지).
# 보안: env, beans 등 민감 엔드포인트는 노출하지 않는다.
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-256-bits-long}
  access-token-expiration: 900000       # 15분 (ms)
  refresh-token-expiration: 604800000   # 7일 (ms)

cors:
  allowed-origins:
    - "*"

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      # 운영 환경에서는 스키마 자동 변경을 금지한다.
      # 신규 컬럼/인덱스가 필요하면 별도 마이그레이션 SQL로 적용 후 배포한다.
      ddl-auto: validate
    show-sql: false

# prod에서는 JWT_SECRET 환경변수 미설정 시 즉시 기동 실패하도록 fallback 제거
jwt:
  secret: ${JWT_SECRET}

# prod에서는 CORS_ALLOWED_ORIGIN 환경변수로 명시적 origin 지정 필수 (와일드카드 차단)
cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGIN}
