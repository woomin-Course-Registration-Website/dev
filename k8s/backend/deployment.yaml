apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: student-mgmt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1       # 배포 중 최대 3개 Pod 허용
      maxUnavailable: 0 # 항상 2개 이상 유지 — 무중단 보장
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ${ECR_BACKEND_IMAGE}:${IMAGE_TAG}  # CD에서 envsubst로 치환
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        envFrom:
        - secretRef:
            name: backend-secrets  # ExternalSecret이 Secrets Manager에서 동기화
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
      # Spring Boot graceful shutdown을 위한 대기 시간
      terminationGracePeriodSeconds: 60
